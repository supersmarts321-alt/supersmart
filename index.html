<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סופר סמארט - ברוכים הבאים לקהילה</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; color: #1c1e21; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 450px; width: 90%; border-top: 6px solid #2ecc71; }
        .icon { font-size: 60px; margin-bottom: 15px; }
        h1 { color: #2ecc71; font-size: 28px; margin-bottom: 10px; }
        p { font-size: 18px; line-height: 1.5; margin: 10px 0; }
        .details-box { background: #f9f9f9; padding: 20px; border-radius: 12px; margin: 20px 0; border-right: 5px solid #2ecc71; text-align: right; font-size: 17px; }
        .btn { background-color: #25D366; color: white; border: none; padding: 16px 20px; border-radius: 15px; font-size: 19px; font-weight: bold; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; transition: 0.3s; box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3); }
        .btn:hover { background-color: #128C7E; transform: translateY(-2px); }
        .item-row { margin-bottom: 5px; border-bottom: 1px dotted #ddd; padding-bottom: 5px; }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <div id="content">
        <div class="icon">🍎🥦🍇</div>
        <h1>סופר סמארט</h1>
        <p>ברוכים הבאים לקהילה שלנו...</p>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const isSuccess = urlParams.get('thankyou');
    const customerName = urlParams.get('contact') || "לקוח יקר";
    const totalAmount = urlParams.get('sum') || "0.00";

    const cartData = JSON.parse(localStorage.getItem('shopping_cart')) || [];
    const contentDiv = document.getElementById('content');

    if (isSuccess) {
        let itemsHtml = "";
        let itemsTextForWA = "";

        if (cartData.length > 0) {
            cartData.forEach(item => {
                itemsHtml += `<div class="item-row">🧺 ${item.name} (${item.quantity})</div>`;
                itemsTextForWA += `🧺 ${item.name} (${item.quantity})\n`;
            });
        } else {
            itemsHtml = "הזמנה חדשה מחבר קהילה";
            itemsTextForWA = "פירוט מוצרים יצורף טלפונית";
        }

        contentDiv.innerHTML = `
            <div class="icon">✨🙌✨</div>
            <h1>איזה כיף שאתה איתנו, ${customerName}!</h1>
            <p>שמחים שהצטרפת לקהילת <b>סופר סמארט</b>. התשלום עבר בהצלחה והסל הטרי שלך כבר בדרך להכנה! 🍎🥕</p>
            <div class="details-box">
                <strong>💰 סיכום עסקה:</strong> ₪${totalAmount}<br><br>
                <strong>📦 מה בחרת מהטבע:</strong><br>
                ${itemsHtml}
            </div>
            <p>לחצו כאן לעדכון הקהילה ותיאום איסוף:</p>
            <button class="btn" onclick="sendToWhatsApp('${customerName}', '${totalAmount}', \`${encodeURIComponent(itemsTextForWA)}\`)">
                 תיאום איסוף בוואטסאפ 💬
            </button>
        `;
    } else {
        contentDiv.innerHTML = `
            <div class="icon">🍎🥦🍇</div>
            <h1>סופר סמארט</h1>
            <p>ברוכים הבאים לקהילה הכי רעננה שיש!<br>הדף מוכן ומחכה לסיום הרכישה.</p>
        `;
    }

    function sendToWhatsApp(name, sum, items) {
        const decodedItems = decodeURIComponent(items);
        const phoneNumber = "972547607110"; // <--- שנה כאן למספר שלך
        
        const message = `*✨ ברוכים הבאים לקהילת סופר סמארט! ✨*\n` +
                        `🍎🥦🍇🥕🍅🍌🥦🍎\n\n` +
                        `*איזה כיף, יש לנו הזמנה חדשה!* 🎉\n\n` +
                        `👤 *חבר קהילה:* ${name}\n` +
                        `💰 *סכום רכישה:* ₪${sum}\n\n` +
                        `📦 *הסל שנבחר:* \n${decodedItems}\n` +
                        `🏪 *נא לתאם איתי את האיסוף מהחנות!* \n\n` +
                        `*תודה שבחרתם סופר סמארט!* 🌱`;
        
        const waUrl = `https://api.whatsapp.com/send?phone=${phoneNumber}&text=${encodeURIComponent(message)}`;
        window.open(waUrl, '_blank');
    }
</script>

</body>
</html>
