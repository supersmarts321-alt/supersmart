<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תודה רבה - סופר סמארט</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f0fdf4; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; width: 90%; }
        .icon { font-size: 50px; margin-bottom: 10px; }
        h1 { color: #16a34a; margin-bottom: 10px; font-size: 24px; }
        p { color: #374151; font-size: 1.1rem; line-height: 1.5; margin-bottom: 8px; }
        .btn { display: inline-block; background-color: #25d366; color: white; padding: 14px 28px; border-radius: 50px; text-decoration: none; font-weight: bold; margin-top: 20px; transition: transform 0.2s; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); }
        .btn:hover { transform: scale(1.05); background-color: #1ebe57; }
        .strong-text { font-weight: bold; color: #16a34a; }
    </style>
</head>
<body>
    <div class="card">
        <div id="success-content">
            <div class="icon">🍎🥦✨</div>
            <h1>איזה כיף שחזרת אלינו!</h1>
            <p>התשלום עבר בהצלחה. אנחנו כבר מתחילים להכין את הסחורה הכי טרייה בשבילך.</p>
            <p><strong>נשאר רק שלב אחד אחרון:</strong></p>
            <p>שלחו לנו הודעה קצרה לוואטסאפ כדי שנתאם את שעת המשלוח הנוחה לכם.</p>
            <a id="whatsapp-link" href="#" class="btn" target="_blank">לחצו כאן לתיאום בוואטסאפ ✅</a>
        </div>
    </div>

    <script>
        // שליפת נתונים מהכתובת (URL)
        const urlParams = new URLSearchParams(window.location.search);
        
        // הפרטים שלך
        const myPhoneNumber = "972547607110"; 
        
        // ניסיון למצוא שם וסכום משדות שונים שטרנזילה עשויה לשלוח
        const contactName = urlParams.get('contact') || urlParams.get('pname') || urlParams.get('n') || 'חבר קהילה';
        const amount = urlParams.get('sum') || urlParams.get('amount') || '';
        
        // בניית הודעה חכמה
        let message = "";
        if (amount && !isNaN(amount) && amount > 0) {
            message = `שלום סופר סמארט, כאן ${contactName}. ביצעתי הרגע הזמנה בסך ${amount} ש"ח באתר. אשמח לתאם משלוח!`;
        } else {
            message = `שלום סופר סמארט, כאן ${contactName}. ביצעתי הרגע הזמנה באתר ואשמח לתאם איתכם את זמן המשלוח!`;
        }
        
        // עדכון הקישור בכפתור
        const finalLink = `https://api.whatsapp.com/send?phone=${972547607110}&text=${encodeURIComponent(message)}`;
        document.getElementById('whatsapp-link').href = finalLink;
    </script>
</body>
</html>
